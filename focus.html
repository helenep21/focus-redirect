<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Focus</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 500px;
      min-height: 300px;
      background: #141414;
      color: #f0f0f0;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Event bar ── */
    #event-bar {
      border-radius: 10px;
      padding: 8px 12px;
      font-weight: 600;
      font-size: 15px;
      background: #2a2a2a;
      color: #fff;
      min-height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      transition: background 0.4s;
    }
    #event-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      background: #555;
    }
    #event-text { flex: 1; line-height: 1.3; }
    #event-cal  { font-size: 10px; opacity: 0.7; }

    /* ── FOCUS badge ── */
    #focus-badge {
      border-radius: 10px;
      padding: 7px 12px;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 1px;
      text-align: center;
      transition: background 0.4s, color 0.4s;
    }
    #focus-badge.focus { background: #e63946; color: #fff; }
    #focus-badge.free  { background: #2a2a2a; color: #555; }

    /* ── Pomodoro ── */
    #pomo-section { display: flex; flex-direction: column; gap: 8px; }

    #pomo-display {
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
      color: #f0f0f0;
      display: none;
    }
    #pomo-display.work  { color: #e63946; }
    #pomo-display.break { color: #57cc99; }

    #pomo-cycle {
      text-align: center;
      font-size: 10px;
      color: #555;
      display: none;
    }

    #btn-pomo {
      width: 100%;
      padding: 9px;
      border-radius: 10px;
      border: none;
      background: #e63946;
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #btn-pomo:hover { background: #c1121f; }
    #btn-pomo.running { background: #457b9d; }
    #btn-pomo.running:hover { background: #2c6e8a; }

    /* ── Divider ── */
    hr { border: none; border-top: 1px solid #2a2a2a; }

    /* ── Auth / Sync row ── */
    #bottom-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .btn-small {
      padding: 5px 10px;
      border-radius: 8px;
      border: none;
      background: #2a2a2a;
      color: #aaa;
      font-size: 11px;
      cursor: pointer;
    }
    .btn-small:hover { background: #333; color: #fff; }

    #sync-status {
      font-size: 10px;
      color: #444;
      text-align: right;
      flex: 1;
    }

    /* ── Today's timeline ── */
    #timeline {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 160px;
      overflow-y: auto;
    }
    .tl-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      color: #777;
      padding: 3px 0;
    }
    .tl-item.active { color: #f0f0f0; }
    .tl-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .tl-time { min-width: 38px; font-variant-numeric: tabular-nums; }
    .tl-title { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>
<body>

  <!-- Current event -->
  <div id="event-bar">
    <div id="event-text">Loading calendar…</div>
  </div>


  <!-- FOCUS badge -->
  <div id="focus-badge" class="free">— FREE —</div>

  <hr>

  <!-- Pomodoro -->
  <div id="pomo-section">
    <div id="pomo-display">00:00</div>
    <div id="pomo-cycle"></div>
    <button id="btn-pomo">▶ Start Pomodoro</button>
  </div>

  <hr>

  <!-- Auth + Sync -->
  <div id="bottom-row">
    <button class="btn-small" id="btn-auth">🔑 Connect</button>
    <button class="btn-small" id="btn-sync">🔄 Sync</button>
    <div id="sync-status">Not synced</div>
  </div>

  <!-- Today's timeline -->
  <div id="timeline"></div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG — fill these in after Google Cloud Console setup
// ═══════════════════════════════════════════════════════════
const CLIENT_ID     = "";
const REDIRECT_URI  = "";

// Calendars that trigger FOCUS mode (case-insensitive match on calendar name)
const FOCUS_CALENDARS = ["work", "projects"];

// Pomodoro settings
const POMO_WORK_MS       = 45 * 60 * 1000;
const POMO_BREAK_MS      = 10 * 60 * 1000;
const POMO_MAX_CYCLES    = 3;

// Auto-sync times (HH:MM)
const SYNC_TIMES = ["07:45", "09:00", "12:00", "15:00", "18:00", "22:00"];

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let token       = localStorage.getItem("gcal_token") || null;
let events      = [];
let pomodoro    = null; // { phase, endTime, cycles, intervalId }

// ═══════════════════════════════════════════════════════════
// OAUTH
// ═══════════════════════════════════════════════════════════
function startAuth() {
  const url = `https://accounts.google.com/o/oauth2/v2/auth`
    + `?client_id=${CLIENT_ID}`
    + `&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`
    + `&response_type=token`
    + `&scope=${encodeURIComponent("https://www.googleapis.com/auth/calendar.readonly")}`;
  window.open(url, "oauth", "width=500,height=600");
}

window.addEventListener("message", e => {
  if (e.data?.type === "OAUTH_TOKEN") {
    token = e.data.token;
    localStorage.setItem("gcal_token", token);
    syncCalendar();
  }
});

// ═══════════════════════════════════════════════════════════
// GOOGLE CALENDAR SYNC
// ═══════════════════════════════════════════════════════════
async function syncCalendar() {
  if (!token) { renderNoAuth(); return; }

  const now      = new Date();
  const dayStart = new Date(now); dayStart.setHours(0,0,0,0);
  const dayEnd   = new Date(now); dayEnd.setHours(23,59,59,999);

  try {
    // 1. Get all calendars
    const calRes  = await apiFetch("https://www.googleapis.com/calendar/v3/users/me/calendarList");
    const cals    = calRes.items || [];

    events = [];

    // 2. For each calendar, fetch today's events
    await Promise.all(cals.map(async cal => {
      const evRes = await apiFetch(
        `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(cal.id)}/events`
        + `?timeMin=${dayStart.toISOString()}&timeMax=${dayEnd.toISOString()}`
        + `&singleEvents=true&orderBy=startTime`
      );
      (evRes.items || []).forEach(ev => {
        events.push({
          title:    ev.summary || "(no title)",
          calName:  cal.summary,
          color:    cal.backgroundColor || "#888",
          start:    new Date(ev.start?.dateTime || ev.start?.date),
          end:      new Date(ev.end?.dateTime   || ev.end?.date),
        });
      });
    }));

    events.sort((a,b) => a.start - b.start);

    document.getElementById("sync-status").textContent =
      `Synced ${now.getHours()}:${String(now.getMinutes()).padStart(2,"0")}`;

    renderUI();

    } catch(err) {
    if (err.status === 401) {
      localStorage.removeItem("gcal_token");
      token = null;
      // Auto-trigger re-auth silently
      startAuth();
    }
    console.error(err);
  }
}

async function apiFetch(url) {
  const res = await fetch(url, {
    headers: { Authorization: `Bearer ${token}` }
  });
  if (!res.ok) throw { status: res.status };
  return res.json();
}

// ═══════════════════════════════════════════════════════════
// RENDER UI
// ═══════════════════════════════════════════════════════════
function renderUI() {
  const now = new Date();

  // Find current event — if multiple active, prefer FOCUS calendar
  const active = events.filter(e => now >= e.start && now < e.end);
  const focusActive = active.filter(e =>
    FOCUS_CALENDARS.some(fc => e.calName.toLowerCase().includes(fc))
  );
  const current = focusActive[0] || active[0] || null;

    // ── Event bar
  const text = document.getElementById("event-text");
  if (current) {
    text.textContent = current.title;
    document.getElementById("event-bar").style.background = current.color;
  } else {
    text.textContent = "No active event";
    document.getElementById("event-bar").style.background = "#2a2a2a";
  }


  // ── FOCUS badge
  const isFocus = focusActive.length > 0;
  const badge   = document.getElementById("focus-badge");
  badge.textContent = isFocus ? "🔴 FOCUS" : "— FREE —";
  badge.className   = isFocus ? "focus" : "free";

  // ── Timeline
  renderTimeline(now, current);
}

function renderTimeline(now, current) {
  const tl = document.getElementById("timeline");
  tl.innerHTML = "";

  // Only show current and future events
  const upcoming = events.filter(ev => ev.end > now);

  upcoming.forEach(ev => {
    const isActive = now >= ev.start && now < ev.end;
    const item = document.createElement("div");
    item.className = "tl-item" + (isActive ? " active" : "");
    const hhmm = t => `${String(t.getHours()).padStart(2,"0")}:${String(t.getMinutes()).padStart(2,"0")}`;
    item.innerHTML = `
      <div class="tl-dot" style="background:${ev.color}"></div>
      <div class="tl-time">${hhmm(ev.start)}</div>
      <div class="tl-title">${ev.title}</div>
    `;
    tl.appendChild(item);
  });

  if (upcoming.length === 0) {
    tl.innerHTML = `<div style="color:#444;font-size:11px;padding:4px 0">No more events today</div>`;
  }
}

function renderNoAuth() {
  document.getElementById("event-text").textContent = "Connect Google Calendar";
  document.getElementById("event-cal").textContent  = "";
  document.getElementById("focus-badge").textContent = "— FREE —";
  document.getElementById("focus-badge").className   = "free";
}

// ═══════════════════════════════════════════════════════════
// POMODORO
// ═══════════════════════════════════════════════════════════
function startPomodoro() {
  pomodoro = {
    phase:      "work",
    cycles:     0,
    endTime:    Date.now() + POMO_WORK_MS,
    intervalId: setInterval(tickPomodoro, 500)
  };
  document.getElementById("pomo-display").style.display = "block";
  document.getElementById("pomo-cycle").style.display   = "block";
  const btn = document.getElementById("btn-pomo");
  btn.textContent = "■ Stop Pomodoro";
  btn.classList.add("running");
}

function stopPomodoro() {
  if (pomodoro?.intervalId) clearInterval(pomodoro.intervalId);
  pomodoro = null;
  document.getElementById("pomo-display").style.display = "none";
  document.getElementById("pomo-cycle").style.display   = "none";
  const btn = document.getElementById("btn-pomo");
  btn.textContent = "▶ Start Pomodoro";
  btn.classList.remove("running");
  document.title = "Focus";
}

function tickPomodoro() {
  if (!pomodoro) return;
  const remaining = Math.max(0, pomodoro.endTime - Date.now());
  const mins = Math.floor(remaining / 60000);
  const secs = Math.floor((remaining % 60000) / 1000);
  const display = `${String(mins).padStart(2,"0")}:${String(secs).padStart(2,"0")}`;
  const phase = pomodoro.phase;

  const el = document.getElementById("pomo-display");
  el.textContent  = (phase === "work" ? "🔴 " : "🟢 ") + display;
  el.className    = phase === "work" ? "work" : "break";

  document.getElementById("pomo-cycle").textContent =
    `Cycle ${pomodoro.cycles + 1} / ${POMO_MAX_CYCLES} — ${phase === "work" ? "Focus" : "Break"}`;

  document.title = `[${display}] Focus`;

  if (remaining > 0) return;

  // Phase ended
  if (phase === "work") {
    const cycles = pomodoro.cycles + 1;
    if (cycles >= POMO_MAX_CYCLES) {
      notify("🎉 Pomodoro complete!", "3 cycles done. Take a proper break.");
      stopPomodoro();
      return;
    }
    notify("🟢 Break time", `${POMO_MAX_CYCLES - cycles} cycle(s) left after this.`);
    pomodoro.phase  = "break";
    pomodoro.cycles = cycles;
    pomodoro.endTime = Date.now() + POMO_BREAK_MS;
  } else {
    notify("🔴 Back to focus", `Starting cycle ${pomodoro.cycles + 1}.`);
    pomodoro.phase   = "work";
    pomodoro.endTime = Date.now() + POMO_WORK_MS;
  }
}

function notify(title, body) {
  if (Notification.permission === "granted") {
    new Notification(title, { body, icon: "" });
  } else if (Notification.permission !== "denied") {
    Notification.requestPermission().then(p => {
      if (p === "granted") new Notification(title, { body });
    });
  }
}

// ═══════════════════════════════════════════════════════════
// AUTO-SYNC SCHEDULER
// ═══════════════════════════════════════════════════════════
function scheduleAutoSync() {
  setInterval(() => {
    const now  = new Date();
    const hhmm = `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
    if (SYNC_TIMES.includes(hhmm) && now.getSeconds() < 30) syncCalendar();
    renderUI(); // always refresh display on every tick
  }, 10000); // every 10 seconds
}

// ═══════════════════════════════════════════════════════════
// EVENT LISTENERS
// ═══════════════════════════════════════════════════════════
document.getElementById("btn-auth").addEventListener("click", startAuth);
document.getElementById("btn-sync").addEventListener("click", () => {
  document.getElementById("sync-status").textContent = "Syncing…";
  syncCalendar();
});
document.getElementById("btn-pomo").addEventListener("click", () => {
  if (pomodoro) stopPomodoro();
  else {
    Notification.requestPermission(); // ask early
    startPomodoro();
  }
});

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
scheduleAutoSync();
if (token) syncCalendar();
else renderNoAuth();
</script>
</body>
</html>
